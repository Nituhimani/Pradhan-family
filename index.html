<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pradhan Family Tree</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0f0e0c;
  --bg2: #1a1814;
  --bg3: #232119;
  --surface: #2a271f;
  --surface2: #332f25;
  --gold: #c9a84c;
  --gold2: #e8c97a;
  --gold3: #f5e4b0;
  --cream: #f0ead8;
  --text: #e8e0cc;
  --text2: #a89e88;
  --text3: #6e6656;
  --male: #4a7fa8;
  --female: #a84a6e;
  --border: rgba(201,168,76,0.15);
  --border2: rgba(201,168,76,0.3);
  --radius: 12px;
  --shadow: 0 8px 32px rgba(0,0,0,0.5);
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);overflow:hidden}

/* Layout */
.app{display:flex;height:100vh;position:relative}
.sidebar{width:320px;flex-shrink:0;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;z-index:10;transition:transform 0.3s}
.sidebar.collapsed{transform:translateX(-320px)}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;position:relative}
.topbar{height:56px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;padding:0 16px;flex-shrink:0;z-index:5}
.canvas-wrap{flex:1;overflow:hidden;position:relative;cursor:grab}
.canvas-wrap:active{cursor:grabbing}
#canvas{position:absolute;top:0;left:0;transform-origin:0 0}

/* Sidebar header */
.sidebar-header{padding:20px 20px 16px;border-bottom:1px solid var(--border)}
.sidebar-header h1{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:500;color:var(--gold2);letter-spacing:0.02em}
.sidebar-header p{font-size:12px;color:var(--text3);margin-top:2px}

/* Search */
.search-wrap{padding:12px 16px;border-bottom:1px solid var(--border)}
.search-input{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:8px 12px 8px 36px;color:var(--text);font-size:13px;font-family:'DM Sans',sans-serif;outline:none;transition:border-color 0.2s}
.search-input:focus{border-color:var(--border2)}
.search-wrap{position:relative}
.search-icon{position:absolute;left:28px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:14px;pointer-events:none}

/* Stats */
.stats-row{display:flex;gap:0;border-bottom:1px solid var(--border)}
.stat{flex:1;padding:12px;text-align:center;border-right:1px solid var(--border)}
.stat:last-child{border-right:none}
.stat-n{font-size:20px;font-weight:500;color:var(--gold2);font-family:'Cormorant Garamond',serif}
.stat-l{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:0.08em;margin-top:1px}

/* Member list */
.member-list{flex:1;overflow-y:auto;padding:8px}
.member-list::-webkit-scrollbar{width:4px}
.member-list::-webkit-scrollbar-track{background:transparent}
.member-list::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
.member-item{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:8px;cursor:pointer;transition:background 0.15s;border:1px solid transparent;margin-bottom:2px}
.member-item:hover{background:var(--surface)}
.member-item.active{background:var(--surface);border-color:var(--border)}
.member-avatar{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:500;flex-shrink:0;overflow:hidden}
.member-avatar img{width:100%;height:100%;object-fit:cover}
.member-info{flex:1;min-width:0}
.member-name{font-size:13px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.member-meta{font-size:11px;color:var(--text3);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.member-gen{font-size:10px;color:var(--text3);padding:2px 6px;background:var(--surface2);border-radius:4px;white-space:nowrap}

/* Sidebar actions */
.sidebar-actions{padding:12px 16px;border-top:1px solid var(--border);display:flex;flex-direction:column;gap:8px}
.btn{display:flex;align-items:center;justify-content:center;gap:6px;padding:9px 16px;border-radius:8px;font-size:13px;font-family:'DM Sans',sans-serif;font-weight:500;cursor:pointer;border:none;transition:all 0.15s}
.btn-gold{background:var(--gold);color:#1a1610}
.btn-gold:hover{background:var(--gold2)}
.btn-outline{background:transparent;color:var(--text2);border:1px solid var(--border2)}
.btn-outline:hover{background:var(--surface);color:var(--text)}
.btn-sm{padding:6px 12px;font-size:12px}
.btn-danger{background:rgba(180,50,50,0.15);color:#e07070;border:1px solid rgba(180,50,50,0.3)}
.btn-danger:hover{background:rgba(180,50,50,0.25)}

/* Topbar */
.topbar-left{display:flex;align-items:center;gap:8px}
.toggle-btn{width:36px;height:36px;border-radius:8px;background:var(--surface);border:1px solid var(--border);color:var(--text2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;transition:all 0.15s}
.toggle-btn:hover{border-color:var(--border2);color:var(--text)}
.page-title{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:500;color:var(--gold2)}
.topbar-right{margin-left:auto;display:flex;gap:8px;align-items:center}
.zoom-ctrl{display:flex;align-items:center;gap:4px;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:4px}
.zoom-btn{width:28px;height:28px;background:transparent;border:none;color:var(--text2);cursor:pointer;border-radius:6px;font-size:14px;display:flex;align-items:center;justify-content:center;transition:all 0.15s}
.zoom-btn:hover{background:var(--surface2);color:var(--text)}
.zoom-label{font-size:12px;color:var(--text2);min-width:38px;text-align:center}
.view-btns{display:flex;background:var(--surface);border:1px solid var(--border);border-radius:8px;overflow:hidden}
.view-btn{padding:6px 12px;font-size:12px;color:var(--text2);background:transparent;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all 0.15s}
.view-btn.active{background:var(--surface2);color:var(--gold2)}

/* Tree nodes */
.tree-node{position:absolute;cursor:pointer}
.node-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:12px;width:148px;transition:all 0.15s;position:relative}
.node-card:hover{border-color:var(--border2);box-shadow:0 0 20px rgba(201,168,76,0.08)}
.node-card.selected{border-color:var(--gold);box-shadow:0 0 24px rgba(201,168,76,0.2)}
.node-card.male{border-top:2px solid var(--male)}
.node-card.female{border-top:2px solid var(--female)}
.node-card.unknown{border-top:2px solid var(--text3)}
.node-avatar{width:36px;height:36px;border-radius:50%;margin:0 auto 8px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:500;overflow:hidden}
.node-avatar img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.node-name{font-size:12px;font-weight:500;text-align:center;color:var(--text);line-height:1.3;word-break:break-word}
.node-loc{font-size:10px;color:var(--text3);text-align:center;margin-top:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.node-dod{font-size:10px;color:var(--text3);text-align:center;margin-top:1px}
.node-spouse{font-size:10px;color:var(--female);text-align:center;margin-top:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.node-add-btn{position:absolute;bottom:-11px;left:50%;transform:translateX(-50%);width:22px;height:22px;background:var(--bg2);border:1px solid var(--border2);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;color:var(--gold);z-index:5;transition:all 0.15s;opacity:0}
.tree-node:hover .node-add-btn{opacity:1}
.node-add-btn:hover{background:var(--gold);color:#1a1610;transform:translateX(-50%) scale(1.1)}

/* SVG connectors */
#connectors{position:absolute;top:0;left:0;pointer-events:none;overflow:visible}

/* Detail panel */
.detail-panel{position:fixed;right:0;top:0;bottom:0;width:300px;background:var(--bg2);border-left:1px solid var(--border);z-index:20;transform:translateX(100%);transition:transform 0.3s;display:flex;flex-direction:column;overflow:hidden}
.detail-panel.open{transform:translateX(0)}
.detail-header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px}
.detail-avatar{width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:500;flex-shrink:0;overflow:hidden}
.detail-avatar img{width:100%;height:100%;object-fit:cover}
.detail-name{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:500;color:var(--gold2)}
.detail-role{font-size:12px;color:var(--text3);margin-top:1px}
.detail-close{margin-left:auto;width:28px;height:28px;background:var(--surface);border:1px solid var(--border);border-radius:6px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text2);flex-shrink:0;font-size:14px}
.detail-close:hover{color:var(--text)}
.detail-body{flex:1;overflow-y:auto;padding:16px}
.detail-body::-webkit-scrollbar{width:4px}
.detail-body::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
.detail-section{margin-bottom:16px}
.detail-section-title{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid var(--border)}
.detail-row{display:flex;gap:8px;margin-bottom:6px;align-items:flex-start}
.detail-lbl{font-size:11px;color:var(--text3);min-width:70px;padding-top:1px}
.detail-val{font-size:13px;color:var(--text)}
.detail-tag{display:inline-flex;align-items:center;gap:4px;font-size:11px;padding:3px 8px;border-radius:4px;margin:2px}
.tag-male{background:rgba(74,127,168,0.15);color:#7ab3d4}
.tag-female{background:rgba(168,74,110,0.15);color:#d47a9a}
.tag-unknown{background:var(--surface);color:var(--text2)}
.detail-children{display:flex;flex-wrap:wrap;gap:4px}
.child-chip{font-size:11px;padding:3px 8px;background:var(--surface);border:1px solid var(--border);border-radius:4px;cursor:pointer;color:var(--text2);transition:all 0.15s}
.child-chip:hover{border-color:var(--border2);color:var(--text)}
.detail-actions{padding:16px;border-top:1px solid var(--border);display:flex;flex-direction:column;gap:8px}
.btn-row{display:flex;gap:8px}
.btn-row .btn{flex:1}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:100;display:none;align-items:center;justify-content:center;padding:16px}
.modal-overlay.open{display:flex}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:16px;width:100%;max-width:480px;max-height:90vh;display:flex;flex-direction:column;overflow:hidden}
.modal-header{padding:20px 24px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.modal-title{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:500;color:var(--gold2)}
.modal-body{flex:1;overflow-y:auto;padding:20px 24px}
.modal-body::-webkit-scrollbar{width:4px}
.modal-body::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
.modal-footer{padding:16px 24px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end}
.form-group{margin-bottom:16px}
.form-label{font-size:12px;color:var(--text3);display:block;margin-bottom:6px;text-transform:uppercase;letter-spacing:0.06em}
.form-input,.form-select,.form-textarea{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:9px 12px;color:var(--text);font-size:13px;font-family:'DM Sans',sans-serif;outline:none;transition:border-color 0.2s}
.form-input:focus,.form-select:focus,.form-textarea:focus{border-color:var(--border2)}
.form-select option{background:var(--bg2)}
.form-textarea{resize:vertical;min-height:64px}
.form-row{display:flex;gap:12px}
.form-row .form-group{flex:1}
.gender-toggle{display:flex;gap:0;background:var(--surface);border:1px solid var(--border);border-radius:8px;overflow:hidden}
.gender-opt{flex:1;padding:8px;text-align:center;font-size:12px;cursor:pointer;transition:all 0.15s;color:var(--text2)}
.gender-opt.active.male{background:rgba(74,127,168,0.2);color:#7ab3d4}
.gender-opt.active.female{background:rgba(168,74,110,0.2);color:#d47a9a}
.gender-opt.active.unknown{background:var(--surface2);color:var(--text)}
.form-divider{height:1px;background:var(--border);margin:16px 0;position:relative}
.form-divider-label{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:var(--bg2);padding:0 8px;font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:0.08em}
.toggle-row{display:flex;align-items:center;gap:10px;margin-bottom:16px}
.toggle-sw{width:36px;height:20px;background:var(--surface);border:1px solid var(--border2);border-radius:10px;cursor:pointer;position:relative;transition:background 0.2s}
.toggle-sw.on{background:var(--gold)}
.toggle-sw::after{content:'';width:14px;height:14px;background:#fff;border-radius:50%;position:absolute;top:2px;left:2px;transition:left 0.2s}
.toggle-sw.on::after{left:18px}
.toggle-label{font-size:13px;color:var(--text2)}
.photo-preview{width:64px;height:64px;border-radius:50%;border:1px solid var(--border);background:var(--surface);display:flex;align-items:center;justify-content:center;margin-bottom:8px;overflow:hidden}
.photo-preview img{width:100%;height:100%;object-fit:cover}

/* Toast */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--surface2);border:1px solid var(--border2);border-radius:8px;padding:10px 20px;font-size:13px;color:var(--text);z-index:200;opacity:0;transition:all 0.3s;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.success{border-color:rgba(100,180,100,0.4);color:#90d490}
.toast.error{border-color:rgba(180,80,80,0.4);color:#d49090}

/* Empty state */
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:12px;opacity:0.5}
.empty-icon{font-size:48px}
.empty-text{font-size:14px;color:var(--text2)}

/* Scrollbar general */
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

/* Generation badge */
.gen-badge{position:absolute;top:4px;right:4px;font-size:9px;color:var(--text3);background:var(--surface2);padding:1px 5px;border-radius:3px}

/* Responsive */
@media(max-width:600px){
  .sidebar{width:100%;position:absolute;height:100%;z-index:15}
  .sidebar.collapsed{transform:translateX(-100%)}
  .detail-panel{width:100%}
}

/* Analytics */
.analytics-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:20px;margin-bottom:24px}
.analytics-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:20px}
.analytics-card h3{font-family:'Cormorant Garamond',serif;font-size:17px;font-weight:500;color:var(--gold2);margin-bottom:4px}
.analytics-card p{font-size:11px;color:var(--text3);margin-bottom:16px;text-transform:uppercase;letter-spacing:0.06em}
.chart-canvas{width:100%;display:block}
.legend{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px}
.legend-item{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text2)}
.legend-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.bar-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.bar-label{font-size:12px;color:var(--text2);min-width:100px;text-align:right;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bar-track{flex:1;height:20px;background:var(--surface);border-radius:4px;overflow:hidden;position:relative}
.bar-fill{height:100%;border-radius:4px;display:flex;align-items:center;justify-content:flex-end;padding-right:6px;font-size:11px;font-weight:500;min-width:24px;transition:width 0.6s ease}
.bar-count{font-size:12px;color:var(--text3);min-width:24px;text-align:right;flex-shrink:0}
.stat-big-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px}
.stat-big{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:16px;text-align:center}
.stat-big-n{font-size:36px;font-weight:300;font-family:'Cormorant Garamond',serif}
.stat-big-l{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:0.08em;margin-top:2px}
</style>
</head>
<body>
<div class="app">
  <!-- Sidebar -->
  <div class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <h1>🌳 Pradhan Family</h1>
      <p>Heritage & Lineage</p>
    </div>
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input class="search-input" type="text" placeholder="Search members..." oninput="searchMembers(this.value)" style="padding-left:36px">
    </div>
    <div class="stats-row" id="statsRow">
      <div class="stat"><div class="stat-n" id="statTotal">0</div><div class="stat-l">Members</div></div>
      <div class="stat"><div class="stat-n" id="statGen">0</div><div class="stat-l">Generations</div></div>
      <div class="stat"><div class="stat-n" id="statLiving">0</div><div class="stat-l">Living</div></div>
    </div>
    <div class="member-list" id="memberList"></div>
    <div class="sidebar-actions">
      <button class="btn btn-gold" onclick="openAddModal(null,'child')">+ Add Member</button>
      <div style="display:flex;gap:8px">
        <button class="btn btn-outline btn-sm" style="flex:1" onclick="exportJSON()">Export JSON</button>
        <button class="btn btn-outline btn-sm" style="flex:1" onclick="importJSON()">Import JSON</button>
        <input type="file" id="importFile" accept=".json" style="display:none" onchange="handleImport(this)">
      </div>
    </div>
  </div>

  <!-- Main -->
  <div class="main">
    <div class="topbar">
      <div class="topbar-left">
        <button class="toggle-btn" onclick="toggleSidebar()" title="Toggle sidebar">☰</button>
        <span class="page-title">Pradhan Family Tree</span>
      </div>
      <div class="topbar-right">
        <div class="view-btns">
          <button class="view-btn active" id="viewTree" onclick="setView('tree')">Tree</button>
          <button class="view-btn" id="viewList" onclick="setView('list')">List</button>
          <button class="view-btn" id="viewAnalytics" onclick="setView('analytics')">Analytics</button>
        </div>
        <div class="zoom-ctrl">
          <button class="zoom-btn" onclick="zoomOut()">−</button>
          <span class="zoom-label" id="zoomLabel">100%</span>
          <button class="zoom-btn" onclick="zoomIn()">+</button>
          <button class="zoom-btn" onclick="resetZoom()" title="Reset">↺</button>
        </div>
        <button class="btn btn-outline btn-sm" onclick="fitTree()">Fit</button>
      </div>
    </div>

    <div class="canvas-wrap" id="canvasWrap">
      <div id="canvas" style="position:absolute;top:0;left:0;transform-origin:0 0">
        <svg id="connectorsSvg" style="position:absolute;top:0;left:0;overflow:visible;pointer-events:none">
          <defs>
            <marker id="arrowGold" markerWidth="10" markerHeight="10" refX="9" refY="3.5" orient="auto">
              <polygon points="0 0, 10 3.5, 0 7" fill="rgba(201,168,76,0.85)"/>
            </marker>
            <marker id="arrowGoldFaint" markerWidth="10" markerHeight="10" refX="9" refY="3.5" orient="auto">
              <polygon points="0 0, 10 3.5, 0 7" fill="rgba(201,168,76,0.5)"/>
            </marker>
          </defs>
          <g id="connectors"></g>
        </svg>
      </div>
    </div>

    <!-- List view -->
    <div id="listView" style="display:none;flex:1;overflow:auto;padding:20px">
      <div id="listContent"></div>
    </div>

    <!-- Analytics view -->
    <div id="analyticsView" style="display:none;flex:1;overflow:auto;padding:24px;background:var(--bg)">
      <div id="analyticsContent"></div>
    </div>
  </div>
</div>

<!-- Detail Panel -->
<div class="detail-panel" id="detailPanel">
  <div class="detail-header">
    <div class="detail-avatar" id="detailAvatar"></div>
    <div>
      <div class="detail-name" id="detailName"></div>
      <div class="detail-role" id="detailRole"></div>
    </div>
    <div class="detail-close" onclick="closeDetail()">✕</div>
  </div>
  <div class="detail-body" id="detailBody"></div>
  <div class="detail-actions" id="detailActions"></div>
</div>

<!-- Add/Edit Modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modalTitle">Add Member</div>
      <div class="detail-close" onclick="closeModal()">✕</div>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label">Full Name *</label>
        <input class="form-input" type="text" id="fName" placeholder="Enter full name">
      </div>
      <div class="form-group">
        <label class="form-label">Gender</label>
        <div class="gender-toggle">
          <div class="gender-opt active male" id="gMale" onclick="setGender('male')">♂ Male</div>

const NODE_W = 148, NODE_H = 118, H_GAP = 28, V_GAP = 90;

// ───── Utilities ─────
function uid(){ return Math.random().toString(36).slice(2,9) }
function initials(n){ return n.trim().split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase() }
function avatarBg(g){ return g==='male'?'rgba(74,127,168,0.25)':g==='female'?'rgba(168,74,110,0.25)':'rgba(110,102,86,0.25)' }
function avatarColor(g){ return g==='male'?'#7ab3d4':g==='female'?'#d47a9a':'#a89e88' }

function findById(node, id){
  if(node.id===id) return node;
  for(const c of node.children||[]){ const r=findById(c,id); if(r) return r; }
  return null;
}
function findParent(node, id, par=null){
  if(node.id===id) return par;
  for(const c of node.children||[]){ const r=findParent(c,id,node); if(r!==undefined) return r; }
  return undefined;
}
function allNodes(node, arr=[]){
  arr.push(node);
  (node.children||[]).forEach(c=>allNodes(c,arr));
  return arr;
}
function nodeDepth(node, target, d=0){
  if(node.id===target) return d;
  for(const c of node.children||[]){ const r=nodeDepth(c,target,d+1); if(r!==-1) return r; }
  return -1;
}

function toast(msg, type=''){

  t.textContent=msg; t.className='toast show '+(type||'');

// ───── Layout Engine ─────
function subtreeWidth(node){
  if(!(node.children||[]).length) return NODE_W;
  const cw = node.children.reduce((s,c)=>s+subtreeWidth(c)+H_GAP,0)-H_GAP;
  return Math.max(NODE_W, cw);
}

function layoutTree(node, x, y, positions={}){
  const sw = subtreeWidth(node);
  const nx = x + (sw-NODE_W)/2;
  positions[node.id] = {x:nx, y};
  if((node.children||[]).length){
    let cx = x;
    for(const c of node.children){
      const csw=subtreeWidth(c);
      layoutTree(c, cx, y+NODE_H+V_GAP, positions);
      cx += csw+H_GAP;
    }
  }
  return positions;
}

// ───── Render Tree ─────
function renderTree(){
  const canvas = document.getElementById('canvas');
  // Remove all children except the SVG
  const svg = document.getElementById('connectorsSvg');
  while(canvas.firstChild && canvas.firstChild !== svg) canvas.removeChild(canvas.firstChild);
  while(canvas.lastChild && canvas.lastChild !== svg) canvas.removeChild(canvas.lastChild);
  const connG = document.getElementById('connectors');
  connG.innerHTML = '';

  nodePositions = layoutTree(tree, 0, 0);

  // find bounds
  let maxX=0, maxY=0;
  for(const p of Object.values(nodePositions)){
    maxX=Math.max(maxX,p.x+NODE_W);
    maxY=Math.max(maxY,p.y+NODE_H);
  }
  const W = maxX+120, H = maxY+120;
  svg.setAttribute('width', W);
  svg.setAttribute('height', H);
  svg.style.width = W+'px';
  svg.style.height = H+'px';

  // draw connectors — bright, visible, with arrowheads
  const all = allNodes(tree);
  for(const node of all){
    if(!(node.children||[]).length) continue;
    const pp = nodePositions[node.id];
    const px = pp.x+NODE_W/2, py = pp.y+NODE_H+2;

    // horizontal bar across all children
    if(node.children.length > 1){
      const firstCp = nodePositions[node.children[0].id];
      const lastCp  = nodePositions[node.children[node.children.length-1].id];
      const barY = py + (nodePositions[node.children[0].id].y - py) * 0.45;
      // vertical stem from parent down to bar
      const stem = document.createElementNS('http://www.w3.org/2000/svg','line');
      stem.setAttribute('x1', px); stem.setAttribute('y1', py);
      stem.setAttribute('x2', px); stem.setAttribute('y2', barY);
      stem.setAttribute('stroke','rgba(201,168,76,0.75)');
      stem.setAttribute('stroke-width','2');
      connG.appendChild(stem);
      // horizontal bar
      const bar = document.createElementNS('http://www.w3.org/2000/svg','line');
      bar.setAttribute('x1', firstCp.x+NODE_W/2);
      bar.setAttribute('y1', barY);
      bar.setAttribute('x2', lastCp.x+NODE_W/2);
      bar.setAttribute('y2', barY);
      bar.setAttribute('stroke','rgba(201,168,76,0.75)');
      bar.setAttribute('stroke-width','2');
      connG.appendChild(bar);
      // vertical drops to each child with arrowhead
      for(const child of node.children){
        const cp = nodePositions[child.id];
        const cx = cp.x+NODE_W/2, cy = cp.y - 10;
        const drop = document.createElementNS('http://www.w3.org/2000/svg','line');
        drop.setAttribute('x1', cx); drop.setAttribute('y1', barY);
        drop.setAttribute('x2', cx); drop.setAttribute('y2', cy);
        drop.setAttribute('stroke','rgba(201,168,76,0.75)');
        drop.setAttribute('stroke-width','2');
        drop.setAttribute('marker-end','url(#arrowGold)');
        connG.appendChild(drop);
      }
    } else {
      // single child — straight line with arrow
      const child = node.children[0];
      const cp = nodePositions[child.id];
      const cx = cp.x+NODE_W/2, cy = cp.y - 10;
      const my = py + (cy - py) * 0.5;
      const path = document.createElementNS('http://www.w3.org/2000/svg','path');
      path.setAttribute('d',`M${px},${py} C${px},${my} ${cx},${my} ${cx},${cy}`);
      path.setAttribute('stroke','rgba(201,168,76,0.75)');
      path.setAttribute('stroke-width','2');
      path.setAttribute('fill','none');
      path.setAttribute('marker-end','url(#arrowGold)');
      connG.appendChild(path);
    }
  }

  // draw nodes
  for(const node of all){
    const pos = nodePositions[node.id];
    const el = document.createElement('div');
    el.className='tree-node';
    el.id='tn_'+node.id;
    el.style.left=pos.x+'px';
    el.style.top=pos.y+'px';

    let avatarHTML;
    if(node.photo){
      avatarHTML=`<div class="node-avatar"><img src="${node.photo}" alt="" onerror="this.parentNode.innerHTML='<span>${initials(node.name)}</span>'"></div>`;
    } else {
      avatarHTML=`<div class="node-avatar" style="background:${avatarBg(node.gender)};color:${avatarColor(node.gender)}">${initials(node.name)}</div>`;
    }

    const gen = nodeDepth(tree, node.id);
    const isDeceased=node.status==='dead'||!!node.dod;
    el.innerHTML=`
      <div class="node-card ${node.gender} ${node.id===selectedNodeId?'selected':''}" onclick="selectNode('${node.id}')">
        <div class="gen-badge">Gen ${gen+1}</div>
        <div style="position:absolute;top:6px;left:8px;width:7px;height:7px;border-radius:50%;background:${isDeceased?'#e07070':'#6dba8a'}" title="${isDeceased?'Deceased':'Alive'}"></div>
        ${avatarHTML}
        <div class="node-name">${node.name}</div>
        ${node.dod?`<div class="node-dod">† ${node.dod.slice(0,4)}</div>`:''}
        ${node.location?`<div class="node-loc">📍 ${node.location}</div>`:''}
        ${node.spouse?`<div class="node-spouse">⚭ ${node.spouse.name}</div>`:''}
      </div>
      <div class="node-add-btn" onclick="event.stopPropagation();openAddModal('${node.id}','child')" title="Add child">+</div>
    `;
    canvas.appendChild(el);
  }

  applyTransform();
  updateSidebar();
  updateStats();
}


function applyTransform(){
  const canvas = document.getElementById('canvas');
  canvas.style.transform=`translate(${panX}px,${panY}px) scale(${scale})`;
}

// ───── Pan & Zoom ─────
const cw = document.getElementById('canvasWrap');
cw.addEventListener('mousedown', e=>{
  if(e.target.closest('.node-card,.node-add-btn')) return;
  isPanning=true; panStart={x:e.clientX-panX,y:e.clientY-panY};
});
window.addEventListener('mousemove', e=>{
  if(!isPanning) return;
  panX=e.clientX-panStart.x; panY=e.clientY-panStart.y;
  applyTransform();
});
window.addEventListener('mouseup',()=>isPanning=false);
cw.addEventListener('wheel', e=>{
  e.preventDefault();
  const delta = e.deltaY>0?-0.1:0.1;
  scale=Math.min(2,Math.max(0.3,scale+delta));
  document.getElementById('zoomLabel').textContent=Math.round(scale*100)+'%';
  applyTransform();
},{passive:false});

// Touch
let touches=[];
cw.addEventListener('touchstart',e=>{
  touches=Array.from(e.touches);
  if(touches.length===1){ isPanning=true; panStart={x:touches[0].clientX-panX,y:touches[0].clientY-panY}; }
});
cw.addEventListener('touchmove',e=>{
  e.preventDefault();
  const t=Array.from(e.touches);
  if(t.length===1&&isPanning){ panX=t[0].clientX-panStart.x; panY=t[0].clientY-panStart.y; applyTransform(); }
  if(t.length===2){
    const d=Math.hypot(t[0].clientX-t[1].clientX,t[0].clientY-t[1].clientY);
    const od=Math.hypot(touches[0].clientX-touches[1].clientX,touches[0].clientY-touches[1].clientY);
    scale=Math.min(2,Math.max(0.3,scale*(d/od)));
    document.getElementById('zoomLabel').textContent=Math.round(scale*100)+'%';
    applyTransform();
  }
  touches=t;
},{passive:false});
cw.addEventListener('touchend',()=>isPanning=false);

function zoomIn(){ scale=Math.min(2,scale+0.15); document.getElementById('zoomLabel').textContent=Math.round(scale*100)+'%'; applyTransform(); }
function zoomOut(){ scale=Math.max(0.3,scale-0.15); document.getElementById('zoomLabel').textContent=Math.round(scale*100)+'%'; applyTransform(); }
function resetZoom(){ scale=1; panX=40; panY=40; document.getElementById('zoomLabel').textContent='100%'; applyTransform(); }
function fitTree(){
  const canvas=document.getElementById('canvas');
  const cw=document.getElementById('canvasWrap');
  const tw=parseFloat(canvas.style.width)||800;
  const th=parseFloat(canvas.style.height)||600;
  const ww=cw.clientWidth, wh=cw.clientHeight;
  scale=Math.min(ww/tw,wh/th,1)*0.9;
  panX=(ww-tw*scale)/2; panY=40;
  document.getElementById('zoomLabel').textContent=Math.round(scale*100)+'%';
  applyTransform();
}

function selectNode(id){

  showDetail(id);
  // highlight in list
  document.querySelectorAll('.member-item').forEach(i=>i.classList.toggle('active',i.dataset.id===id));
}

  const gLabel={male:'Male',female:'Female',unknown:'Unknown'}[p.gender];
  const gen=nodeDepth(tree,id);

  const par=findParent(tree,id);
  const children=(p.children||[]);

  let body='';

  body+=`<div class="detail-row"><span class="detail-lbl">Gender</span><span class="detail-val"><span class="detail-tag tag-${p.gender}">${gLabel}</span></span></div>`;
  const isDeceased=p.status==='dead'||!!p.dod;
  body+=`<div class="detail-row"><span class="detail-lbl">Status</span><span class="detail-val"><span style="display:inline-flex;align-items:center;gap:5px;font-size:12px;padding:3px 9px;border-radius:4px;background:${isDeceased?'rgba(180,80,80,0.12)':'rgba(109,186,138,0.12)'};color:${isDeceased?'#e07070':'#6dba8a'}">${isDeceased?'† Deceased':'✓ Alive'}</span></span></div>`;
  if(p.dob) body+=`<div class="detail-row"><span class="detail-lbl">Born</span><span class="detail-val">${p.dob}</span></div>`;
  if(p.dod) body+=`<div class="detail-row"><span class="detail-lbl">Died</span><span class="detail-val">${p.dod}</span></div>`;
  if(p.location) body+=`<div class="detail-row"><span class="detail-lbl">Location</span><span class="detail-val">📍 ${p.location}</span></div>`;
  if(p.occupation) body+=`<div class="detail-row"><span class="detail-lbl">Occupation</span><span class="detail-val">${p.occupation}</span></div>`;
  if(p.notes) body+=`<div class="detail-row"><span class="detail-lbl">Notes</span><span class="detail-val">${p.notes}</span></div>`;
  body+=`</div>`;

  if(p.spouse){
    body+=`<div class="detail-section"><div class="detail-section-title">Spouse</div>`;
    body+=`<div class="detail-row"><span class="detail-lbl">Name</span><span class="detail-val">⚭ ${p.spouse.name}</span></div>`;
    if(p.spouse.location) body+=`<div class="detail-row"><span class="detail-lbl">Location</span><span class="detail-val">${p.spouse.location}</span></div>`;
    if(p.spouse.marriageDate) body+=`<div class="detail-row"><span class="detail-lbl">Married</span><span class="detail-val">${p.spouse.marriageDate}</span></div>`;
    body+=`</div>`;
  }

  body+=`<div class="detail-section"><div class="detail-section-title">Family</div>`;
  if(par) body+=`<div class="detail-row"><span class="detail-lbl">Parent</span><span class="detail-val" style="cursor:pointer;color:var(--gold)" onclick="selectNode('${par.id}')">${par.name}</span></div>`;
  if(children.length){
    body+=`<div class="detail-row"><span class="detail-lbl">Children</span><div class="detail-val"><div class="detail-children">`;
    children.forEach(c=>{
      body+=`<span class="child-chip" onclick="selectNode('${c.id}')">${c.name}</span>`;
    });
    body+=`</div></div></div>`;
  }
  body+=`</div>`;

  document.getElementById('detailBody').innerHTML=body;
  document.getElementById('detailActions').innerHTML=`
    <div class="btn-row">
      <button class="btn btn-gold btn-sm" onclick="openEditModal('${id}')">✏ Edit</button>
      <button class="btn btn-outline btn-sm" onclick="openAddModal('${id}','child')">+ Child</button>
    </div>
    <div class="btn-row">
      <button class="btn btn-outline btn-sm" onclick="openSpouseModal('${id}')">⚭ ${p.spouse?'Edit':'Add'} Spouse</button>
      ${id!==tree.id?`<button class="btn btn-danger btn-sm" onclick="deleteMember('${id}')">🗑 Delete</button>`:''}
    </div>
  `;

  document.getElementById('detailPanel').classList.add('open');
}

function closeDetail(){
  document.getElementById('detailPanel').classList.remove('open');
  selectedNodeId=null;
  document.querySelectorAll('.node-card').forEach(n=>n.classList.remove('selected'));
  document.querySelectorAll('.member-item').forEach(i=>i.classList.remove('active'));
}

// ───── Sidebar ─────
function updateSidebar(){
  const all=allNodes(tree);
  const list=document.getElementById('memberList');
  const q=document.querySelector('.search-input').value.toLowerCase();
  const filtered=q?all.filter(n=>n.name.toLowerCase().includes(q)):all;

  if(!filtered.length){
    list.innerHTML=`<div class="empty-state"><div class="empty-icon">🔍</div><div class="empty-text">No members found</div></div>`;
    return;
  }

  list.innerHTML=filtered.map(n=>{
    let av;
    if(n.photo) av=`<div class="member-avatar"><img src="${n.photo}" alt="" onerror="this.parentNode.innerHTML='<span style=font-size:11px;font-weight:500;color:${avatarColor(n.gender)}>${initials(n.name)}</span>'"></div>`;
    else av=`<div class="member-avatar" style="background:${avatarBg(n.gender)};color:${avatarColor(n.gender)}">${initials(n.name)}</div>`;
    const gen=nodeDepth(tree,n.id);
    const meta=[n.location,n.dod?'†'+n.dod.slice(0,4):''].filter(Boolean).join(' · ');
    return `<div class="member-item ${n.id===selectedNodeId?'active':''}" data-id="${n.id}" onclick="selectNode('${n.id}');scrollToNode('${n.id}')">
      ${av}
      <div class="member-info">
        <div class="member-name">${n.name}</div>
        ${meta?`<div class="member-meta">${meta}</div>`:''}
      </div>
      <div class="member-gen">Gen ${gen+1}</div>
    </div>`;
  }).join('');
}

function updateStats(){
  const all=allNodes(tree);
  document.getElementById('statTotal').textContent=all.length;
  const maxGen=Math.max(...all.map(n=>nodeDepth(tree,n.id)))+1;
  document.getElementById('statGen').textContent=maxGen;
  document.getElementById('statLiving').textContent=all.filter(n=>n.status!=='dead'&&!n.dod).length;
}

function searchMembers(q){
  updateSidebar();
}

function scrollToNode(id){
  const pos=nodePositions[id];
  if(!pos) return;
  const cw=document.getElementById('canvasWrap');
  panX=cw.clientWidth/2-pos.x*scale-NODE_W*scale/2;
  panY=cw.clientHeight/2-pos.y*scale-NODE_H*scale/2;
  applyTransform();
}

function toggleSidebar(){
  document.getElementById('sidebar').classList.toggle('collapsed');
}

// ───── Views ─────
function setView(v){
  currentView=v;
  document.getElementById('viewTree').classList.toggle('active',v==='tree');
  document.getElementById('viewList').classList.toggle('active',v==='list');
  document.getElementById('viewAnalytics').classList.toggle('active',v==='analytics');
  document.getElementById('canvasWrap').style.display=v==='tree'?'block':'none';
  document.getElementById('listView').style.display=v==='list'?'flex':'none';
  document.getElementById('analyticsView').style.display=v==='analytics'?'flex':'none';
  // Hide zoom controls in non-tree views
  document.querySelector('.zoom-ctrl').style.display=v==='tree'?'flex':'none';
  document.querySelector('.btn-outline.btn-sm[onclick="fitTree()"]').style.display=v==='tree'?'':'none';
  if(v==='list') renderListView();
  if(v==='analytics') renderAnalytics();
}

function renderListView(){
  const all=allNodes(tree);
  const lc=document.getElementById('listContent');
  lc.innerHTML=`<table style="width:100%;border-collapse:collapse">
    <thead><tr style="border-bottom:1px solid var(--border)">
      ${['Name','Status','Gender','Generation','Location','Born','Died','Spouse','Occupation'].map(h=>`<th style="text-align:left;padding:10px 12px;font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:0.08em;font-weight:400">${h}</th>`).join('')}
    </tr></thead>
    <tbody>
    ${all.map(n=>{
      const gen=nodeDepth(tree,n.id)+1;
      const isDeceased=n.status==='dead'||!!n.dod;
      return `<tr style="border-bottom:1px solid var(--border);cursor:pointer" onclick="setView('tree');selectNode('${n.id}');scrollToNode('${n.id}')" onmouseover="this.style.background='var(--surface)'" onmouseout="this.style.background='transparent'">
        <td style="padding:10px 12px;font-size:13px;color:var(--text)">${n.name}</td>
        <td style="padding:10px 12px"><span style="font-size:11px;padding:2px 7px;border-radius:4px;background:${isDeceased?'rgba(180,80,80,0.12)':'rgba(109,186,138,0.12)'};color:${isDeceased?'#e07070':'#6dba8a'}">${isDeceased?'Deceased':'Living'}</span></td>
        <td style="padding:10px 12px"><span class="detail-tag tag-${n.gender}" style="font-size:11px">${n.gender}</span></td>
        <td style="padding:10px 12px;font-size:13px;color:var(--text2)">${gen}</td>
        <td style="padding:10px 12px;font-size:13px;color:var(--text2)">${n.location||'—'}</td>
        <td style="padding:10px 12px;font-size:13px;color:var(--text2)">${n.dob||'—'}</td>
        <td style="padding:10px 12px;font-size:13px;color:var(--text2)">${n.dod||'—'}</td>
        <td style="padding:10px 12px;font-size:13px;color:var(--text2)">${n.spouse?n.spouse.name:'—'}</td>
        <td style="padding:10px 12px;font-size:13px;color:var(--text2)">${n.occupation||'—'}</td>
      </tr>`;
    }).join('')}
    </tbody>
  </table>`;
}

// ───── Modal ─────
function openAddModal(parentId, type){
  editingId=null; addingParentId=parentId; addingType=type;
  selectedGender='male'; selectedSpouseGender='female'; spouseToggleOn=false;
  document.getElementById('modalTitle').textContent=parentId?'Add Child Member':'Add Member';
  clearForm();
  document.getElementById('modalOverlay').classList.add('open');
}

function openEditModal(id){
  const p=findById(tree,id);
  if(!p) return;
  editingId=id; addingType='edit';
  selectedGender=p.gender;
  selectedSpouseGender=p.spouse?p.spouse.gender||'female':'female';
  spouseToggleOn=!!p.spouse;
  document.getElementById('modalTitle').textContent='Edit '+p.name;
  document.getElementById('fName').value=p.name;
  document.getElementById('fDob').value=p.dob||'';
  document.getElementById('fDod').value=p.dod||'';
  document.getElementById('fLocation').value=p.location||'';
  document.getElementById('fOccupation').value=p.occupation||'';
  document.getElementById('fNotes').value=p.notes||'';
  document.getElementById('fPhoto').value=p.photo||'';
  previewPhoto(p.photo||'');
  if(p.spouse){
    document.getElementById('fSpouseName').value=p.spouse.name||'';
    document.getElementById('fSpouseLocation').value=p.spouse.location||'';
    document.getElementById('fMarriageDate').value=p.spouse.marriageDate||'';
    document.getElementById('fSpousePhoto').value=p.spouse.photo||'';
  }
  updateGenderBtns(); updateSpouseGenderBtns();
  selectedStatus=p.status||( p.dod?'dead':'alive'); updateStatusBtns();
  const sw=document.getElementById('spouseToggle');
  sw.className='toggle-sw'+(spouseToggleOn?' on':'');
  document.getElementById('spouseSection').style.display=spouseToggleOn?'block':'none';
  document.getElementById('modalOverlay').classList.add('open');
}

function openSpouseModal(id){
  openEditModal(id);
  spouseToggleOn=true;
  document.getElementById('spouseToggle').className='toggle-sw on';
  document.getElementById('spouseSection').style.display='block';
}

function clearForm(){
  ['fName','fDob','fDod','fLocation','fOccupation','fNotes','fPhoto','fSpouseName','fSpouseLocation','fMarriageDate','fSpousePhoto'].forEach(f=>document.getElementById(f).value='');
  document.getElementById('photoPreview').innerHTML='<span style="color:var(--text3);font-size:11px">No photo</span>';
  document.getElementById('spouseToggle').className='toggle-sw';
  document.getElementById('spouseSection').style.display='none';
  selectedStatus='alive'; updateStatusBtns();
  updateGenderBtns(); updateSpouseGenderBtns();
}

function closeModal(){ document.getElementById('modalOverlay').classList.remove('open'); }

document.getElementById('modalOverlay').onclick=function(e){
  if(e.target===this) closeModal();
};

function saveMember(){
  const name=document.getElementById('fName').value.trim();
  if(!name){ toast('Name is required','error'); return; }

  const spouseName=document.getElementById('fSpouseName').value.trim();
  const spouse=spouseToggleOn&&spouseName?{
    name:spouseName, gender:selectedSpouseGender,
    location:document.getElementById('fSpouseLocation').value.trim(),
    marriageDate:document.getElementById('fMarriageDate').value,
    photo:document.getElementById('fSpousePhoto').value.trim()
  }:null;

  const data={name,gender:selectedGender,
    dob:document.getElementById('fDob').value,
    dod:document.getElementById('fDod').value,
    status:selectedStatus,
    location:document.getElementById('fLocation').value.trim(),
    occupation:document.getElementById('fOccupation').value.trim(),
    notes:document.getElementById('fNotes').value.trim(),
    photo:document.getElementById('fPhoto').value.trim(),
    spouse};

  if(addingType==='edit'&&editingId){
    const p=findById(tree,editingId);
    Object.assign(p,data);
    toast('Member updated','success');
  } else {
    const newM={id:uid(),...data,children:[]};
    if(addingParentId){
      const par=findById(tree,addingParentId);
      if(par) par.children.push(newM);
    }
    toast('Member added','success');
  }

  closeModal();
  renderTree();
  if(editingId) showDetail(editingId);
}

function deleteMember(id){
  if(id===tree.id){ toast('Cannot delete root','error'); return; }
  const p=findById(tree,id);
  const childCount=allNodes(p).length;
  if(!confirm(`Delete "${p.name}"${childCount>1?' and '+( childCount-1)+' descendant(s)':''}?`)) return;
  function remove(node,tid){ node.children=(node.children||[]).filter(c=>c.id!==tid); node.children.forEach(c=>remove(c,tid)); }
  remove(tree,id);
  closeDetail();
  renderTree();
  toast('Member deleted');
}

// ───── Gender toggles ─────
function setGender(g){ selectedGender=g; updateGenderBtns(); }
function updateGenderBtns(){
  ['male','female','unknown'].forEach(g=>{
    const el=document.getElementById('g'+g[0].toUpperCase()+g.slice(1));
    el.className='gender-opt '+g+(selectedGender===g?' active':'');
  });
}
function setSpouseGender(g){ selectedSpouseGender=g; updateSpouseGenderBtns(); }
function updateSpouseGenderBtns(){
  ['male','female','unknown'].forEach(g=>{
    const el=document.getElementById('sg'+g[0].toUpperCase()+g.slice(1));
    el.className='gender-opt '+g+(selectedSpouseGender===g?' active':'');
  });
}
function toggleSpouse(){
  spouseToggleOn=!spouseToggleOn;
  document.getElementById('spouseToggle').className='toggle-sw'+(spouseToggleOn?' on':'');
  document.getElementById('spouseSection').style.display=spouseToggleOn?'block':'none';
}

function previewPhoto(url){
  const p=document.getElementById('photoPreview');
  if(url){ p.innerHTML=`<img src="${url}" alt="" style="width:64px;height:64px;object-fit:cover;border-radius:50%" onerror="this.parentNode.innerHTML='<span style=color:var(--text3);font-size:11px>Invalid URL</span>'">`; }
  else { p.innerHTML='<span style="color:var(--text3);font-size:11px">No photo</span>'; }
}

// ───── Export / Import ─────
function exportJSON(){
  const blob=new Blob([JSON.stringify(tree,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url; a.download='pradhan_family_tree.json'; a.click();
  URL.revokeObjectURL(url);
  toast('Exported successfully','success');
}

function importJSON(){ document.getElementById('importFile').click(); }

function handleImport(input){
  const file=input.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      tree=JSON.parse(e.target.result);
      renderTree();
      if(currentView==='analytics') renderAnalytics();
      if(currentView==='list') renderListView();
      toast('Family tree imported','success');
    } catch(err){ toast('Invalid JSON file','error'); }
  };
  reader.readAsText(file);
  input.value='';
}

// ───── Status toggle ─────
function setStatus(s){ selectedStatus=s; updateStatusBtns(); }
function updateStatusBtns(){
  document.getElementById('sAlive').className='gender-opt'+(selectedStatus==='alive'?' active':'');
  document.getElementById('sAlive').style.color=selectedStatus==='alive'?'#6dba8a':'var(--text3)';
  document.getElementById('sDead').className='gender-opt'+(selectedStatus==='dead'?' active':'');
  document.getElementById('sDead').style.color=selectedStatus==='dead'?'#e07070':'var(--text3)';
}

// ───── Analytics ─────
const PALETTE=['#c9a84c','#4a7fa8','#a84a6e','#6dba8a','#8a6dbf','#bf8a6d','#6dbfbf','#bf6d8a','#8abf6d','#a8a84a'];

function renderAnalytics(){
  const all=allNodes(tree);
  const ac=document.getElementById('analyticsContent');

  // compute stats
  const total=all.length;
  const alive=all.filter(n=>n.status!=='dead'&&!n.dod).length;
  const dead=total-alive;
  const males=all.filter(n=>n.gender==='male').length;
  const females=all.filter(n=>n.gender==='female').length;
  const unknown=total-males-females;

  // location map
  const locMap={};
  all.forEach(n=>{
    const loc=(n.location||'').trim();
    if(loc){ locMap[loc]=(locMap[loc]||0)+1; }
    else{ locMap['Unknown']=(locMap['Unknown']||0)+1; }
  });
  const locEntries=Object.entries(locMap).sort((a,b)=>b[1]-a[1]);

  // generation map
  const genMap={};
  all.forEach(n=>{
    const g=nodeDepth(tree,n.id)+1;
    genMap[g]=(genMap[g]||0)+1;
  });
  const genEntries=Object.entries(genMap).sort((a,b)=>+a[0]-+b[0]);

  // occupation map
  const occMap={};
  all.forEach(n=>{
    const o=(n.occupation||'').trim()||'Unknown';
    occMap[o]=(occMap[o]||0)+1;
  });
  const occEntries=Object.entries(occMap).sort((a,b)=>b[1]-a[1]).slice(0,8);

  ac.innerHTML=`
    <div style="font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:500;color:var(--gold2);margin-bottom:4px">Family Analytics</div>
    <p style="font-size:12px;color:var(--text3);margin-bottom:24px">Overview of the Pradhan family data · ${total} members</p>

    <div class="stat-big-grid">
      <div class="stat-big"><div class="stat-big-n" style="color:var(--gold2)">${total}</div><div class="stat-big-l">Total Members</div></div>
      <div class="stat-big"><div class="stat-big-n" style="color:#6dba8a">${alive}</div><div class="stat-big-l">Living</div></div>
      <div class="stat-big"><div class="stat-big-n" style="color:#e07070">${dead}</div><div class="stat-big-l">Deceased</div></div>
      <div class="stat-big"><div class="stat-big-n" style="color:var(--gold2)">${Math.max(...Object.keys(genMap).map(Number))}</div><div class="stat-big-l">Generations</div></div>
    </div>

    <div class="analytics-grid">
      <div class="analytics-card">
        <h3>Alive vs Deceased</h3>
        <p>Status distribution</p>
        ${buildPieChart([['Living',alive,'#6dba8a'],['Deceased',dead,'#e07070']],180)}
      </div>
      <div class="analytics-card">
        <h3>Gender Distribution</h3>
        <p>Male · Female · Unknown</p>
        ${buildPieChart([['Male',males,'#4a7fa8'],['Female',females,'#a84a6e'],['Unknown',unknown,'#888780']],180)}
      </div>
    </div>

    <div class="analytics-grid">
      <div class="analytics-card" style="grid-column:1/-1">
        <h3>Members by Location</h3>
        <p>Where family members are from</p>
        ${buildBarChart(locEntries,PALETTE,'#c9a84c')}
      </div>
    </div>

    <div class="analytics-grid">
      <div class="analytics-card">
        <h3>Members by Generation</h3>
        <p>How many per generation</p>
        ${buildBarChart(genEntries.map(([k,v])=>['Gen '+k,v]),PALETTE,'#4a7fa8')}
      </div>
      <div class="analytics-card">
        <h3>Occupation Breakdown</h3>
        <p>Top occupations in the family</p>
        ${buildBarChart(occEntries,PALETTE,'#a84a6e')}
      </div>
    </div>
  `;
}

function buildPieChart(data,size){
  const total=data.reduce((s,[,v])=>s+v,0);
  if(total===0) return '<p style="color:var(--text3);font-size:13px">No data</p>';
  const cx=size/2,cy=size/2,r=size*0.38,ir=size*0.22;
  let svgPaths='',angle=-Math.PI/2,legendHTML='';
  data.forEach(([label,val,color])=>{
    if(val===0) return;
    const frac=val/total;
    const sweep=frac*2*Math.PI;
    const x1=cx+r*Math.cos(angle), y1=cy+r*Math.sin(angle);
    const x2=cx+r*Math.cos(angle+sweep), y2=cy+r*Math.sin(angle+sweep);
    const ix1=cx+ir*Math.cos(angle), iy1=cy+ir*Math.sin(angle);
    const ix2=cx+ir*Math.cos(angle+sweep), iy2=cy+ir*Math.sin(angle+sweep);
    const large=sweep>Math.PI?1:0;
    const pct=Math.round(frac*100);
    // label on slice
    const midA=angle+sweep/2;
    const lx=cx+(r+ir)/2*Math.cos(midA), ly=cy+(r+ir)/2*Math.sin(midA);
    svgPaths+=`<path d="M${ix1},${iy1} L${x1},${y1} A${r},${r} 0 ${large},1 ${x2},${y2} L${ix2},${iy2} A${ir},${ir} 0 ${large},0 ${ix1},${iy1}Z" fill="${color}" opacity="0.9" stroke="var(--bg2)" stroke-width="2"/>`;
    if(pct>=5) svgPaths+=`<text x="${lx}" y="${ly}" text-anchor="middle" dominant-baseline="middle" fill="#fff" font-size="11" font-weight="500">${pct}%</text>`;
    legendHTML+=`<div class="legend-item"><div class="legend-dot" style="background:${color}"></div>${label}: <strong>${val}</strong></div>`;
    angle+=sweep;
  });
  // center text
  svgPaths+=`<text x="${cx}" y="${cy-6}" text-anchor="middle" fill="var(--text2)" font-size="11">Total</text>`;
  svgPaths+=`<text x="${cx}" y="${cy+10}" text-anchor="middle" fill="var(--gold2)" font-size="18" font-weight="500">${total}</text>`;

  return `<svg class="chart-canvas" viewBox="0 0 ${size} ${size}" style="max-width:${size}px;margin:0 auto;display:block">${svgPaths}</svg>
  <div class="legend">${legendHTML}</div>`;
}

function buildBarChart(entries,palette,defaultColor){
  if(!entries.length) return '<p style="color:var(--text3);font-size:13px">No data</p>';
  const max=Math.max(...entries.map(([,v])=>v));
  return entries.map(([label,val],i)=>{
    const pct=max>0?Math.round(val/max*100):0;
    const col=palette[i%palette.length]||defaultColor;
    return `<div class="bar-row">
      <div class="bar-label" title="${label}">${label}</div>
      <div class="bar-track">
        <div class="bar-fill" style="width:${pct}%;background:${col};color:${i<3?'#1a1810':'#fff'}">${val}</div>
      </div>
      <div class="bar-count">${val}</div>
    </div>`;
  }).join('');
}

// ───── Keyboard shortcuts ─────
document.addEventListener('keydown',e=>{
  if(e.key==='Escape'){ closeModal(); closeDetail(); }
  if(e.key==='n'&&!e.target.matches('input,textarea')){ openAddModal(selectedNodeId,'child'); }
  if(e.key==='f'&&!e.target.matches('input,textarea')){ fitTree(); }
});

// ───── Init ─────
renderTree();
setTimeout(fitTree, 100);
</script>
